<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 600" role="img" aria-label="MindSet cover framed for Notion">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b4f8a"/>
      <stop offset="55%" stop-color="#0a2f5f"/>
      <stop offset="100%" stop-color="#07182d"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#04101d" flood-opacity="0.55"/>
    </filter>
    <clipPath id="frameClip">
      <rect x="430" y="87" width="640" height="426" rx="14" ry="14"/>
    </clipPath>
  </defs>
  <rect width="1500" height="600" fill="url(#bg)"/>
  <rect x="430" y="87" width="640" height="426" rx="14" ry="14" fill="#0d274a" opacity="0.96" filter="url(#shadow)"/>
  <image x="430" y="87" width="640" height="426" preserveAspectRatio="xMidYMid slice" clip-path="url(#frameClip)" href="data:image/jpeg;base64,"/>
</svg>
